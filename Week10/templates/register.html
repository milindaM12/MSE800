<h2>Register</h2>

<form method="post">

    Full Name:
    <input type="text"
           name="full_name">

    <br><br>

    Date of Birth:
    <input type="date"
           name="dob">

    <br><br>

    Email:
    <input type="email"
           name="email">

    <br><br>

    Username:
    <input type="text"
           name="username">

    <br><br>

    Password:
    <input type="password"
           name="password">

    <br><br>

    <button type="submit">
        Register
    </button>

</form>
